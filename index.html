<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Telegram Counter Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js?59"></script>

  <style>
    html, body {
      touch-action: manipulation;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px 60px;
      box-sizing: border-box;
    }

    h1 {
      margin-bottom: 20px;
    }

    .counter {
      font-size: 48px;
      margin: 20px 0;
    }

    #starting_money {
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 8px;
    }

    #save_feedback {
      font-size: 13px;
      color: green;
      height: 18px;
      margin-top: 4px;
    }

    #save_btn {
      margin-top: 8px;
      font-size: 16px;
      padding: 8px 24px;
      cursor: pointer;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 8px;
    }

    #set_start_btn {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      padding: 0;
      cursor: pointer;
      background: transparent;
      color: var(--tg-theme-hint-color, #999999);
      border: none;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    #transactions_section {
      width: 100%;
      max-width: 360px;
      margin-top: 24px;
    }

    #transactions_section h3 {
      margin: 0 0 8px;
      font-size: 14px;
      opacity: 0.7;
    }

    #transactions_table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    #transactions_table th {
      text-align: left;
      padding: 4px 8px;
      border-bottom: 1px solid currentColor;
      opacity: 0.5;
      font-weight: normal;
    }

    #transactions_table td {
      padding: 6px 8px;
      border-bottom: 1px solid rgba(128,128,128,0.2);
    }

    #transactions_table .spent {
      color: #e53935;
    }

    #transactions_table .gained {
      color: #43a047;
    }

    #transactions_table tfoot td {
      font-weight: bold;
      border-top: 1px solid currentColor;
      border-bottom: none;
      padding-top: 8px;
    }

    #history_btn {
      margin-top: 32px;
      font-size: 14px;
      padding: 6px 20px;
      cursor: pointer;
      background: transparent;
      color: var(--tg-theme-hint-color, #999999);
      border: 1px solid var(--tg-theme-hint-color, #999999);
      border-radius: 8px;
    }

    #history_overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: flex-end;
    }

    #history_overlay.open {
      display: flex;
    }

    #history_panel {
      width: 100%;
      max-height: 85vh;
      background: var(--tg-theme-bg-color, #ffffff);
      border-radius: 16px 16px 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #history_header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 8px;
      flex-shrink: 0;
    }

    #history_header span {
      font-size: 16px;
      font-weight: bold;
    }

    #history_close_btn {
      font-size: 22px;
      line-height: 1;
      padding: 0 4px;
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--tg-theme-hint-color, #999999);
    }

    #history_filter {
      padding: 0 16px 12px;
      flex-shrink: 0;
    }

    #history_month_select {
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid rgba(128,128,128,0.4);
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
    }

    #history_clear_all_btn {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      padding: 0;
      cursor: pointer;
      background: transparent;
      color: var(--tg-theme-hint-color, #999999);
      border: none;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    #history_content {
      overflow-y: auto;
      padding: 0 16px 24px;
    }

    #history_empty {
      font-size: 14px;
      opacity: 0.5;
      text-align: center;
      padding: 24px 0;
    }

    .history_date_header {
      font-size: 13px;
      font-weight: bold;
      opacity: 0.6;
      padding: 12px 0 4px;
    }

    .history_table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .history_table th {
      text-align: left;
      padding: 3px 6px;
      border-bottom: 1px solid currentColor;
      opacity: 0.5;
      font-weight: normal;
    }

    .history_table td {
      padding: 5px 6px;
      border-bottom: 1px solid rgba(128,128,128,0.15);
    }

    .history_table .spent { color: #e53935; }
    .history_table .gained { color: #43a047; }

    .history_delete_btn {
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--tg-theme-hint-color, #bbbbbb);
    }

    .history_delete_btn:active {
      color: #e53935;
    }

    #test_controls {
      display: none;
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #test_controls label {
      white-space: nowrap;
    }

    #clear_cache_btn {
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      background: transparent;
      color: #e53935;
      border: 1px solid #e53935;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <h1 id="date"></h1>
  <div id="starting_money"></div>
  <div><input type="number" id="current_actual_remaining" placeholder="0"></div>
  <button id="save_btn">Save</button>
  <button id="set_start_btn">Set as starting money</button>
  <div id="save_feedback"></div>
  <div class="counter" id="count">0</div>
  <div id="per_day"></div>

  <div id="transactions_section" style="display:none">
    <h3>Today's transactions</h3>
    <table id="transactions_table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Balance</th>
          <th>Spent</th>
          <th>Remaining</th>
        </tr>
      </thead>
      <tbody id="transactions_body"></tbody>
      <tfoot id="transactions_footer"></tfoot>
    </table>
  </div>

  <button id="history_btn">History</button>

  <div id="history_overlay">
    <div id="history_panel">
      <div id="history_header">
        <span>Transaction History</span>
        <button id="history_close_btn">&#x2715;</button>
      </div>
      <div id="history_filter">
        <select id="history_month_select"></select>
        <button id="history_clear_all_btn">Clear all history</button>
      </div>
      <div id="history_content"></div>
    </div>
  </div>


  <script>
    const tg = window.Telegram.WebApp;

    const TESTING = location.hostname === "localhost" || location.hostname === "127.0.0.1";

    const DAILY_BUDGET = 200;
    const MAX_BUDGET = 6000;
    const STORAGE_KEY = 'saved_money';
    const STARTING_KEY_PREFIX = 'start_'; // start_YYYY-MM-DD

    // module-level so handleSave can access the current starting money
    let activeStartingMoney = null;

    function toDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function fmt(n) {
      const v = Math.floor(Number(n));
      return isNaN(v) ? 0 : v;
    }

    function getActiveDate() {
      if (TESTING) {
        const val = document.getElementById("test_date").value;
        if (val) return new Date(val + 'T00:00:00');
      }
      return new Date();
    }

    // ── Saved money (end-of-day snapshot) ────────────────────────────────────

    function saveMoney(amount) {
      const entry = { date: toDateKey(getActiveDate()), amount };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entry));
    }

    function loadSavedMoney() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw).amount;
    }

    // Returns the starting money for today, locking it into its own key on first access
    // so subsequent saves (which overwrite STORAGE_KEY) can't affect it.
    function getStartingMoney(activeDate) {
      const key = STARTING_KEY_PREFIX + toDateKey(activeDate);
      const locked = localStorage.getItem(key);
      if (locked !== null) return Number(locked);

      // First time today — check if the most recent snapshot is within the same month
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;

      const { date, amount } = JSON.parse(raw);
      const sameMonth = date && date.slice(0, 7) === toDateKey(activeDate).slice(0, 7);
      const isPast = date && date < toDateKey(activeDate);

      if (!sameMonth || !isPast) return null;

      // Lock it in for the rest of the day
      localStorage.setItem(key, amount);
      return amount;
    }

    // ── Transactions ──────────────────────────────────────────────────────────

    function transactionsKey(date) {
      return `transactions_${toDateKey(date)}`;
    }

    function loadTransactions(date) {
      const raw = localStorage.getItem(transactionsKey(date));
      return raw ? JSON.parse(raw) : [];
    }

    function recordTransaction(date, newValue) {
      const transactions = loadTransactions(date);
      const previousValue = transactions.length > 0
        ? transactions[transactions.length - 1].balance
        : activeStartingMoney;

      const spent = previousValue - newValue; // positive = spent money
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      transactions.push({ time, balance: newValue, spent });
      localStorage.setItem(transactionsKey(date), JSON.stringify(transactions));
    }

    // ── Save handler ──────────────────────────────────────────────────────────

    function handleSave(input) {
      const amount = getCurrentRemaining();
      const date = getActiveDate();

      // Deduplicate only against the last transaction (not starting money)
      const transactions = loadTransactions(date);
      const latestValue = transactions.length > 0
        ? transactions[transactions.length - 1].balance
        : null;

      if (amount === latestValue) {
        input.blur();
        return;
      }

      saveMoney(amount);

      if (activeStartingMoney === null) {
        // First save of the day — set as starting money then record it as the opening transaction
        localStorage.setItem(STARTING_KEY_PREFIX + toDateKey(date), amount);
        activeStartingMoney = amount;
      }
      recordTransaction(date, amount);

      showSaveFeedback();
      input.blur();
      render();
    }

    function showSaveFeedback(msg = "Saved") {
      const el = document.getElementById("save_feedback");
      el.innerText = msg;
      setTimeout(() => { el.innerText = ""; }, 2000);
    }

    function handleSetStartingMoney(input) {
      const amount = getCurrentRemaining();
      const date = getActiveDate();

      // Record a transaction first (while activeStartingMoney is still the old value)
      // Only if there was a prior state to compare against
      if (activeStartingMoney !== null) {
        recordTransaction(date, amount);
      }

      // Override today's starting money
      localStorage.setItem(STARTING_KEY_PREFIX + toDateKey(date), amount);
      // Update snapshot so tomorrow picks this up as yesterday's value
      saveMoney(amount);

      showSaveFeedback("Starting money set");
      input.blur();
      render();
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function render() {
      const today = getActiveDate();
      const dayOfMonth = today.getDate();
      const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
      const remainingDays = daysInMonth - dayOfMonth;

      const monthlyBudget = Math.min(daysInMonth * DAILY_BUDGET, MAX_BUDGET);
      const earnedBudget = dayOfMonth * DAILY_BUDGET;

      document.getElementById("date").innerText = today.toLocaleDateString();

      activeStartingMoney = getStartingMoney(today);
      document.getElementById("starting_money").innerText =
        activeStartingMoney !== null ? `Starting money: ${fmt(activeStartingMoney)}` : "";

      const base = activeStartingMoney !== null ? activeStartingMoney : getCurrentRemaining();
      const perDay = Math.min(base / (remainingDays + 1), DAILY_BUDGET);

      updateUI(earnedBudget, monthlyBudget, perDay);
      renderTransactions(today, perDay);
    }

    function updateUI(earnedBudget, monthlyBudget, perDay) {
      const current = getCurrentRemaining();
      const remaining = (earnedBudget - monthlyBudget) + current;

      document.getElementById("count").innerText = fmt(remaining);
      document.getElementById("per_day").innerText = fmt(perDay);
    }

    function renderTransactions(date, perDay) {
      const transactions = loadTransactions(date);
      const section = document.getElementById("transactions_section");

      if (transactions.length === 0 || activeStartingMoney === null) {
        section.style.display = "none";
        return;
      }

      section.style.display = "block";

      const tbody = document.getElementById("transactions_body");
      tbody.innerHTML = "";

      let totalSpent = 0;

      for (const tx of transactions) {
        const tr = document.createElement("tr");
        const spentClass = tx.spent >= 0 ? "spent" : "gained";
        totalSpent += tx.spent;
        const remaining = perDay - totalSpent;
        tr.innerHTML = `
          <td>${tx.time}</td>
          <td>${fmt(tx.balance)}</td>
          <td class="${spentClass}">${fmt(tx.spent)}</td>
          <td>${fmt(remaining)}</td>
        `;
        tbody.appendChild(tr);
      }

      const totalClass = totalSpent >= 0 ? "spent" : "gained";
      document.getElementById("transactions_footer").innerHTML = `
        <tr>
          <td colspan="2">Total spent</td>
          <td class="${totalClass}">${fmt(totalSpent)}</td>
          <td></td>
        </tr>
      `;
    }

    // ── History ───────────────────────────────────────────────────────────────

    function getAllTransactionDateKeys() {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('transactions_')) keys.push(k.replace('transactions_', ''));
      }
      return keys.sort().reverse(); // newest first
    }

    function getAvailableMonths() {
      const months = new Set();
      getAllTransactionDateKeys().forEach(d => months.add(d.slice(0, 7)));
      return [...months].sort().reverse();
    }

    function calcPerDayForDate(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      const dayOfMonth = date.getDate();
      const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
      const remainingDays = daysInMonth - dayOfMonth;
      const startingMoney = Number(localStorage.getItem(STARTING_KEY_PREFIX + dateStr) ?? DAILY_BUDGET);
      return Math.min(startingMoney / (remainingDays + 1), DAILY_BUDGET);
    }

    function renderHistory(month) {
      const content = document.getElementById("history_content");
      const dates = getAllTransactionDateKeys().filter(d => d.startsWith(month));

      if (dates.length === 0) {
        content.innerHTML = '<div id="history_empty">No transactions this month.</div>';
        return;
      }

      let html = '';
      for (const dateStr of dates) {
        const txs = JSON.parse(localStorage.getItem('transactions_' + dateStr) || '[]');
        if (txs.length === 0) continue;

        const label = new Date(dateStr + 'T00:00:00').toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
        let totalSpent = 0;

        const perDay = calcPerDayForDate(dateStr);
        let rows = '';
        for (let i = 0; i < txs.length; i++) {
          const tx = txs[i];
          const cls = tx.spent >= 0 ? 'spent' : 'gained';
          totalSpent += tx.spent;
          const remaining = perDay - totalSpent;
          rows += `<tr>
            <td>${tx.time}</td>
            <td>${fmt(tx.balance)}</td>
            <td class="${cls}">${fmt(tx.spent)}</td>
            <td>${fmt(remaining)}</td>
            <td><button class="history_delete_btn" data-date="${dateStr}" data-idx="${i}">&#x2715;</button></td>
          </tr>`;
        }

        const totalCls = totalSpent >= 0 ? 'spent' : 'gained';
        html += `
          <div class="history_date_header">${label}</div>
          <table class="history_table">
            <thead><tr><th>Time</th><th>Balance</th><th>Spent</th><th>Remaining</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
            <tfoot><tr>
              <td colspan="2" style="font-weight:bold;padding-top:6px">Total</td>
              <td class="${totalCls}" style="font-weight:bold;padding-top:6px">${fmt(totalSpent)}</td>
              <td></td><td></td>
            </tr></tfoot>
          </table>`;
      }

      content.innerHTML = html || '<div id="history_empty">No transactions this month.</div>';
    }

    function deleteTransaction(dateStr, idx) {
      const key = 'transactions_' + dateStr;
      const txs = JSON.parse(localStorage.getItem(key) || '[]');
      txs.splice(idx, 1);
      if (txs.length === 0) {
        localStorage.removeItem(key);
      } else {
        localStorage.setItem(key, JSON.stringify(txs));
      }
      refreshHistoryAfterClear();
      render();
    }

    function clearAllHistoryData() {
      const toRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && (k.startsWith('transactions_') || k.startsWith('start_'))) {
          toRemove.push(k);
        }
      }
      toRemove.forEach(k => localStorage.removeItem(k));
      localStorage.removeItem(STORAGE_KEY);
    }

    function refreshHistoryAfterClear() {
      const months = getAvailableMonths();
      const select = document.getElementById("history_month_select");
      select.innerHTML = months.map(m => {
        const [year, mon] = m.split('-');
        const label = new Date(Number(year), Number(mon) - 1, 1)
          .toLocaleDateString([], { month: 'long', year: 'numeric' });
        return `<option value="${m}">${label}</option>`;
      }).join('');

      if (months.length === 0) {
        select.innerHTML = '<option value="">No history yet</option>';
        document.getElementById("history_content").innerHTML =
          '<div id="history_empty">No transactions recorded yet.</div>';
      } else {
        renderHistory(months[0]);
      }

      render(); // refresh main view in case today's data was cleared
    }

    function openHistory() {
      const overlay = document.getElementById("history_overlay");
      const select = document.getElementById("history_month_select");

      const months = getAvailableMonths();
      select.innerHTML = months.map(m => {
        const [year, mon] = m.split('-');
        const label = new Date(Number(year), Number(mon) - 1, 1)
          .toLocaleDateString([], { month: 'long', year: 'numeric' });
        return `<option value="${m}">${label}</option>`;
      }).join('');

      if (months.length === 0) {
        select.innerHTML = '<option value="">No history yet</option>';
        document.getElementById("history_content").innerHTML =
          '<div id="history_empty">No transactions recorded yet.</div>';
      } else {
        renderHistory(months[0]);
      }

      overlay.classList.add("open");
    }

    function closeHistory() {
      document.getElementById("history_overlay").classList.remove("open");
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    function init() {
      const input = document.getElementById("current_actual_remaining");

      const savedMoney = loadSavedMoney();
      if (savedMoney !== null) {
        input.value = savedMoney;
      }

      input.addEventListener("input", render);

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleSave(input);
      });

      document.getElementById("save_btn").addEventListener("click", () => {
        handleSave(input);
      });

      document.getElementById("set_start_btn").addEventListener("click", () => {
        handleSetStartingMoney(input);
      });

      document.getElementById("history_btn").addEventListener("click", openHistory);
      document.getElementById("history_close_btn").addEventListener("click", closeHistory);
      document.getElementById("history_overlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeHistory();
      });
      document.getElementById("history_month_select").addEventListener("change", (e) => {
        renderHistory(e.target.value);
      });

      document.getElementById("history_content").addEventListener("click", (e) => {
        const btn = e.target.closest(".history_delete_btn");
        if (!btn) return;
        deleteTransaction(btn.dataset.date, Number(btn.dataset.idx));
      });

      document.getElementById("history_clear_all_btn").addEventListener("click", () => {
        if (!confirm("Clear ALL transaction history? This cannot be undone.")) return;
        clearAllHistoryData();
        refreshHistoryAfterClear();
      });

      if (TESTING) {
        const controls = document.createElement("div");
        controls.id = "test_controls";
        controls.innerHTML = `
          <label for="test_date">Test date:</label>
          <input type="date" id="test_date">
          <button id="clear_cache_btn">Clear Cache</button>
        `;
        document.body.appendChild(controls);
        document.getElementById("test_date").addEventListener("change", () => {
          const date = getActiveDate();
          const txs = loadTransactions(date);
          const input = document.getElementById("current_actual_remaining");
          if (txs.length > 0) {
            input.value = txs[txs.length - 1].balance;
          } else {
            const start = localStorage.getItem(STARTING_KEY_PREFIX + toDateKey(date));
            input.value = start !== null ? start : '';
          }
          render();
        });
        document.getElementById("clear_cache_btn").addEventListener("click", () => {
          if (confirm("Clear all localStorage?")) {
            localStorage.clear();
            location.reload();
          }
        });
      }

      tg.ready();
      render();
    }

    function getCurrentRemaining() {
      return Number(document.getElementById("current_actual_remaining").value);
    }

    init();
  </script>
</body>
</html>
